<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>IndiaPaths</title>
    <script type="text/javascript">
      // Store the requested path to redirect after loading index.html
      var seg = window.location.pathname.split('/').slice(0, 2).join('/');
      sessionStorage.redirect = window.location.pathname.slice(seg.length) + window.location.search + window.location.hash;
      window.location.replace(seg + '/');
    </script>
  </head>
  <body></body>
</html>
